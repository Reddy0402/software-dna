# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to generate for 'slug'
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported from the current
# directory
prepend_sys_path = .

# version location specification; this defaults
# to app/database/migrations/versions.  When using multiple version
# directories, paths must be separated by colons or lines.
# version_locations = %(here)s/bar:%(here)s/bat

# version path separator; defaults to "os.pathsep".
# Use a newline to avoid platform-specific delimiters.
# version_path_separator = :

# set to 'true' to enable searching for version files recursively
# recursive_version_locations = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/software_dna


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts. See the documentation for details.

# format using "black" (if installed)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
